timezone: Asia/Shanghai
defaults:
  currency: CNY
  hl: zh-CN
  request_interval_seconds: 5
  retry_backoffs_seconds:
  - 15
  - 40
  max_retries: 2
routes:
- id: yul-pek
  from: YUL
  to: PEK
  dates:
    mode: rolling
    depart_in_days: 90
  airlines:
    whitelist: []
    blacklist: []
  target_price: null
  drop_alert_pct: null
  sources:
  - fast_flights
  - serpapi
  - ctrip_local
  enabled: true
- id: yul-yvr
  from: YUL
  to: YVR
  dates:
    mode: rolling
    depart_in_days: 30
  airlines:
    whitelist: []
    blacklist: []
  target_price: null
  drop_alert_pct: null
  sources:
  - fast_flights
  - serpapi
  - ctrip_local
  enabled: true
- id: yul-hkg
  from: YUL
  to: HKG
  dates:
    mode: rolling
    depart_in_days: 90
  airlines:
    whitelist: []
    blacklist: []
  target_price: null
  drop_alert_pct: null
  sources:
  - fast_flights
  - serpapi
  - ctrip_local
  enabled: true
cross_check:
  source: serpapi
  daily_quota: 3
  deviation_warn_pct: 20
alerts:
  daily_digest: true
  urgent_single_push: true
  urgent_dedup_hours: 24
  max_urgent_per_day: 5
notifiers:
  feishu:
    enabled: true
    secret_env: FEISHU_WEBHOOK
  telegram:
    enabled: false
  email:
    enabled: false
dashboard:
  output: docs/data/summary.json
  provider: github_pages
  url: https://alexli-77.github.io/cheapest-flights/
hidden_city:
  enabled: true
  origin: YUL
  onward_routes:
  - BKK
  - SGN
  - MNL
  - DPS
  - KUL
  - HAN
  - SYD
  - MEL
  - TPE
  chinese_hubs:
  - PEK
  - PVG
  - SHA
  - CAN
  - SZX
  - CTU
  - XMN
  - HGH
  - NKG
  - WUH
  - CKG
  - XIY
  - KMG
  dates:
    mode: rolling
    depart_in_days: 45
  max_serpapi_per_run: 3
  min_saving_pct: 0
  max_dates_per_onward: 8
  max_direct_lookups: 6
