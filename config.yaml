# flight-watch 配置（全部行为由本文件驱动，改配置不改代码）
# 报告 6.3 节示例的落地版本。若沙箱/环境无 PyYAML，会自动回退读取同目录 config.json
# （两者需保持同步；config.json 是本文件的无依赖镜像）。
timezone: Asia/Shanghai

# 全局默认（可被 route 覆盖）
defaults:
  currency: CNY              # pin 币种，防止随 locale 漂移（红队必改项 #3）
  hl: zh-CN                  # pin 语言/地区
  request_interval_seconds: 10   # 请求间隔，防风控（dry-run/测试注入 0）
  retry_backoffs_seconds: [30, 90]  # 单源失败重试退避（2 次）
  max_retries: 2

routes:
  - id: sha-nrt             # 国际：上海 → 东京，国庆窗口
    from: SHA
    to: NRT
    dates:
      mode: fixed           # rolling | fixed | both
      fixed_dates: ["2026-10-01", "2026-10-02", "2026-10-03"]
    airlines:
      whitelist: []         # 空 = 不限
      blacklist: ["MM"]     # 排除乐桃
    target_price: 1500      # 低于此价 → urgent
    drop_alert_pct: 15      # 单日跌幅超 15% → urgent
    sources: [fast_flights]
    enabled: true

  - id: pek-cdg            # 国际：北京 → 巴黎，圣诞窗口 + 滚动 30 天
    from: PEK
    to: CDG
    dates:
      mode: both
      depart_in_days: 30
      fixed_dates: ["2026-12-24", "2026-12-25"]
    airlines:
      whitelist: []
      blacklist: []
    target_price: 3500
    drop_alert_pct: 15
    sources: [fast_flights, serpapi]
    enabled: true

  - id: sha-can            # 国内：上海 → 广州，滚动 30 天（M3 PoC 通过后启用）
    from: SHA
    to: CAN
    dates:
      mode: rolling
      depart_in_days: 30    # 监控未来 30 天每天的最低价
    airlines:
      whitelist: []
      blacklist: []
    target_price: 400
    drop_alert_pct: 20
    sources: [fast_flights]  # PoC 失败则改为 [ctrip_local]
    enabled: false

cross_check:
  source: serpapi
  daily_quota: 3            # 每天最多 3 次校验，护住免费额度
  deviation_warn_pct: 20    # 与主源偏差 >20% 连续 3 天 → urgent

alerts:
  daily_digest: true        # 每日 1 条汇总卡片
  urgent_single_push: true  # urgent 单独立即推
  urgent_dedup_hours: 24    # 同航线 urgent 24h 去重
  max_urgent_per_day: 5     # 熔断，防轰炸

notifiers:
  feishu:
    enabled: true
    secret_env: FEISHU_WEBHOOK   # webhook 放 GitHub Secrets，不入库
  telegram:
    enabled: false               # 预留
  email:
    enabled: false               # 预留

dashboard:
  output: docs/data/summary.json
  provider: github_pages
  url: "https://alexli-77.github.io/cheapest-flights/"  # 卡片按钮跳转地址（发布后改成真实 Pages 域名）
